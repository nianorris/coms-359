<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" ry="7" fill="#4f46e5"/>
  <!-- Left bracket < -->
  <polyline points="10,10 5,16 10,22" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right bracket > -->
  <polyline points="22,10 27,16 22,22" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Slash / -->
  <line x1="19" y1="9" x2="13" y2="23" stroke="#c7d2fe" stroke-width="2.2" stroke-linecap="round"/>
</svg>
